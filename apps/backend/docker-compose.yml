services:
  postgres:
    image: postgres:17-alpine
    container_name: anyramp-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: anyramp
      POSTGRES_PASSWORD: anyramp
      POSTGRES_DB: anyramp
    # host 5433 to avoid clashing with an existing Postgres on 5432
    ports:
      - "5433:5432"
    volumes:
      - anyramp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anyramp -d anyramp"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  anyramp-pgdata:
